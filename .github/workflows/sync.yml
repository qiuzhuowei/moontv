name: Fork 同步

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'  # 每天 UTC 0 点和 12 点

env:
  # 明确使用 Node.js 20，但允许在 Node.js 24 上运行
  NODE_VERSION: 20
  # 禁用不安全 Node 版本警告
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  sync:
    runs-on: ubuntu-24.04  # 使用最新的 Ubuntu 版本
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        node-version: 20
        
    - name: 设置上游
      run: |
        # 请替换以下信息
        UPSTREAM_OWNER="mtvpls"
        UPSTREAM_REPO="MoonTVPlus"
        TARGET_BRANCH="main"
        
        # 设置 git
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 添加或更新上游远程
        if git remote | grep -q upstream; then
          git remote set-url upstream "https://github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git"
        else
          git remote add upstream "https://github.com/$UPSTREAM_OWNER/$UPSTREAM_REPO.git"
        fi
        
    - name: 同步操作
      run: |
        TARGET_BRANCH="main"
        
        echo "开始同步 upstream/$TARGET_BRANCH 到 origin/$TARGET_BRANCH"
        
        # 检查上游分支是否存在
        if ! git ls-remote --exit-code upstream "$TARGET_BRANCH" > /dev/null 2>&1; then
          echo "错误: 上游分支 upstream/$TARGET_BRANCH 不存在"
          exit 1
        fi
        
        # 获取上游更新
        git fetch upstream "$TARGET_BRANCH"
        
        # 确保在目标分支
        git checkout "$TARGET_BRANCH"
        
        # 尝试快进合并
        if git merge --ff-only "upstream/$TARGET_BRANCH"; then
          echo "快进合并成功"
        else
          echo "无法快进合并，尝试普通合并"
          if git merge "upstream/$TARGET_BRANCH" --no-edit; then
            echo "合并成功"
          else
            echo "合并冲突，使用上游版本"
            git reset --hard "upstream/$TARGET_BRANCH"
          fi
        fi
        
    - name: 推送更新
      run: |
        TARGET_BRANCH="main"
        
        # 检查是否有更改
        if [ -z "$(git status --porcelain)" ]; then
          echo "没有更改，跳过推送"
        else
          echo "有更改，正在推送..."
          git push origin "$TARGET_BRANCH"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 完成通知
      run: |
        echo "✅ 同步流程完成"
        echo "查看仓库: https://github.com/${{ github.repository }}"
